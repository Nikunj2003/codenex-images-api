services:
  mongo:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-codenex}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-codenex}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-codenex-images}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet \"mongodb://$${MONGO_INITDB_ROOT_USERNAME}:$${MONGO_INITDB_ROOT_PASSWORD}@localhost:27017/admin?authSource=admin\" --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI:-mongodb://codenex:codenex@mongo:27017/?authSource=admin}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_ISSUER: ${AUTH0_ISSUER:-}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:-please-change-to-a-strong-32-64-char-secret}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  mongo-data:
